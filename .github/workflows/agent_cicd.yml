name: Agent Log CI/CD
on:
  push:
    paths:
      - 'agent_logs/**.md'
jobs:
  auto-commit-logs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Auto-Commit Agent Updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[CI/CD] Automated Agent Log Sync"